<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>American Weekend Vacation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const BASE_W = 480;
const BASE_H = 270;
canvas.width = BASE_W;
canvas.height = BASE_H;

// Scale to fit window
function resize() {
  const scale = Math.min(window.innerWidth / BASE_W, window.innerHeight / BASE_H);
  canvas.style.width = (BASE_W * scale) + 'px';
  canvas.style.height = (BASE_H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── PALETTE ──────────────────────────────────────────────────────────────────
const C = {
  sky:     '#87CEEB',
  skyDark: '#4a90d9',
  road:    '#555566',
  roadLine:'#FFFF00',
  shoulder:'#888877',
  grass:   '#5a8a3c',
  white:   '#FFFFFF',
  black:   '#000000',
  red:     '#DD2222',
  blue:    '#2244CC',
  yellow:  '#FFDD00',
  orange:  '#FF8800',
  skin:    '#F5C5A3',
  brown:   '#8B5E3C',
  gray:    '#AAAAAA',
  darkGray:'#444444',
  green:   '#33AA44',
  purple:  '#8833CC',
  pink:    '#FF88AA',
  teal:    '#22AAAA',
  tan:     '#D2B48C',
  dkRed:   '#991111',
  ltBlue:  '#AADDFF',
  cream:   '#FFF8DC',
};

// ── INPUT ─────────────────────────────────────────────────────────────────────
const keys = {};
const justPressed = {};
window.addEventListener('keydown', e => {
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.code] = true;
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function consumeKey(code) {
  if (justPressed[code]) { delete justPressed[code]; return true; }
  return false;
}

// ── HIGHSCORES ────────────────────────────────────────────────────────────────
const HS_KEY = 'awv_highscores_v2';
function loadScores() {
  try { return JSON.parse(localStorage.getItem(HS_KEY)) || []; } catch { return []; }
}
function saveScores(arr) { localStorage.setItem(HS_KEY, JSON.stringify(arr)); }
function addScore(initials, points) {
  const scores = loadScores();
  scores.push({ initials: initials.toUpperCase().slice(0,3), score: points });
  scores.sort((a,b) => b.score - a.score); // highest first
  scores.splice(10);
  saveScores(scores);
  return scores;
}
function isHighScore(points) {
  const scores = loadScores();
  if (scores.length < 10) return true;
  return points > scores[scores.length - 1].score;
}

// ── SCENE MANAGER ─────────────────────────────────────────────────────────────
let scene = null;
function setScene(s) { scene = s; scene.init(); }

// ── PIXEL FONT (tiny 5x7 bitmapped) ──────────────────────────────────────────
const FONT = {
  A:'01110 10001 10001 11111 10001 10001 10001',
  B:'11110 10001 10001 11110 10001 10001 11110',
  C:'01110 10001 10000 10000 10000 10001 01110',
  D:'11110 10001 10001 10001 10001 10001 11110',
  E:'11111 10000 10000 11110 10000 10000 11111',
  F:'11111 10000 10000 11110 10000 10000 10000',
  G:'01110 10001 10000 10111 10001 10001 01111',
  H:'10001 10001 10001 11111 10001 10001 10001',
  I:'01110 00100 00100 00100 00100 00100 01110',
  J:'00111 00010 00010 00010 00010 10010 01100',
  K:'10001 10010 10100 11000 10100 10010 10001',
  L:'10000 10000 10000 10000 10000 10000 11111',
  M:'10001 11011 10101 10001 10001 10001 10001',
  N:'10001 11001 10101 10011 10001 10001 10001',
  O:'01110 10001 10001 10001 10001 10001 01110',
  P:'11110 10001 10001 11110 10000 10000 10000',
  Q:'01110 10001 10001 10001 10101 10010 01101',
  R:'11110 10001 10001 11110 10100 10010 10001',
  S:'01111 10000 10000 01110 00001 00001 11110',
  T:'11111 00100 00100 00100 00100 00100 00100',
  U:'10001 10001 10001 10001 10001 10001 01110',
  V:'10001 10001 10001 10001 10001 01010 00100',
  W:'10001 10001 10001 10101 10101 11011 10001',
  X:'10001 10001 01010 00100 01010 10001 10001',
  Y:'10001 10001 01010 00100 00100 00100 00100',
  Z:'11111 00001 00010 00100 01000 10000 11111',
  '0':'01110 10011 10011 10101 11001 11001 01110',
  '1':'00100 01100 00100 00100 00100 00100 01110',
  '2':'01110 10001 00001 00010 00100 01000 11111',
  '3':'11110 00001 00001 01110 00001 00001 11110',
  '4':'00010 00110 01010 10010 11111 00010 00010',
  '5':'11111 10000 10000 11110 00001 00001 11110',
  '6':'00110 01000 10000 11110 10001 10001 01110',
  '7':'11111 00001 00010 00100 01000 01000 01000',
  '8':'01110 10001 10001 01110 10001 10001 01110',
  '9':'01110 10001 10001 01111 00001 00010 01100',
  ' ':'00000 00000 00000 00000 00000 00000 00000',
  '.':'00000 00000 00000 00000 00000 00100 00100',
  ':':'00000 00100 00000 00000 00000 00100 00000',
  '!':'00100 00100 00100 00100 00000 00000 00100',
  '\'':'00100 00100 00000 00000 00000 00000 00000',
  '-':'00000 00000 00000 11111 00000 00000 00000',
  '/':'00001 00001 00010 00100 01000 10000 10000',
  '>':'10000 01000 00100 00010 00100 01000 10000',
};

function drawText(text, x, y, color, scale=1, align='left') {
  const PW = 5, PH = 7, GAP = 1;
  const charW = (PW + GAP) * scale;
  const totalW = text.length * charW - GAP * scale;
  let ox = x;
  if (align === 'center') ox = x - totalW / 2;
  if (align === 'right')  ox = x - totalW;
  ctx.fillStyle = color;
  for (let ci = 0; ci < text.length; ci++) {
    const ch = text[ci].toUpperCase();
    const data = FONT[ch] || FONT[' '];
    const rows = data.split(' ');
    for (let row = 0; row < rows.length; row++) {
      for (let col = 0; col < rows[row].length; col++) {
        if (rows[row][col] === '1') {
          ctx.fillRect(
            Math.floor(ox + ci * charW + col * scale),
            Math.floor(y + row * scale),
            scale, scale
          );
        }
      }
    }
  }
}

function textWidth(text, scale=1) {
  return text.length * (5 + 1) * scale - scale;
}

// ── SPRITE DRAWING HELPERS ────────────────────────────────────────────────────
function pixel(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), 1, 1);
}
function rect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
}
function border(x, y, w, h, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.strokeRect(Math.floor(x)+0.5, Math.floor(y)+0.5, w-1, h-1);
}

// ── DRAW CONNOR (16x20 pixels) ────────────────────────────────────────────────
function drawConnor(x, y, frame, facingRight, gasCanInHand) {
  x = Math.floor(x);
  y = Math.floor(y);
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(x+1, y+19, 14, 2);

  // Body (shirt - blue)
  rect(x+4, y+8, 8, 7, C.blue);
  // Pants (dark)
  rect(x+4, y+15, 4, 5, C.darkGray);
  rect(x+8, y+15, 4, 5, C.darkGray);
  // Shoes
  rect(x+3, y+18, 5, 2, C.brown);
  rect(x+8, y+18, 5, 2, C.brown);

  // Leg animation
  const legOff = frame === 1 ? 1 : (frame === 3 ? -1 : 0);
  rect(x+4, y+15, 4, 5, C.darkGray);
  rect(x+8, y+15, 4, 5, C.darkGray);
  if (frame === 1 || frame === 3) {
    rect(x+3, y+15+legOff, 4, 5, C.darkGray);
    rect(x+9, y+15-legOff, 4, 5, C.darkGray);
    rect(x+2, y+18+legOff, 5, 2, C.brown);
    rect(x+8, y+18-legOff, 5, 2, C.brown);
  }

  // Head
  rect(x+4, y+1, 8, 7, C.skin);
  // Hair (brown)
  rect(x+4, y+1, 8, 2, C.brown);
  // Eyes
  rect(x+(facingRight?8:5), y+4, 2, 1, C.black);
  // Mouth
  rect(x+(facingRight?7:5), y+6, 3, 1, C.black);

  // Arms
  const armSwing = frame === 1 ? -1 : (frame === 3 ? 1 : 0);
  rect(x+2, y+9+armSwing, 3, 2, C.skin);
  if (gasCanInHand) {
    // Gas can in right hand
    if (facingRight) {
      rect(x+11, y+9-armSwing, 3, 2, C.skin);
      rect(x+12, y+7, 4, 6, C.red);
      rect(x+14, y+6, 2, 2, C.darkGray);
    } else {
      rect(x+11, y+9-armSwing, 3, 2, C.skin);
      rect(x+10, y+7, 4, 6, C.red);
      rect(x+10, y+6, 2, 2, C.darkGray);
    }
  } else {
    rect(x+11, y+9-armSwing, 3, 2, C.skin);
  }
}

// ── DRAW GROUND CAR ───────────────────────────────────────────────────────────
function drawCar(x, y, type, frame) {
  x = Math.floor(x); y = Math.floor(y);
  // type 0=sedan, 1=truck, 2=suv, 3=van, 4=sports
  const configs = [
    { w:40, h:18, body:C.red,    roof:C.dkRed,  wheel:C.darkGray },
    { w:52, h:20, body:C.blue,   roof:C.ltBlue,  wheel:C.darkGray },
    { w:44, h:22, body:C.green,  roof:C.green,   wheel:C.darkGray },
    { w:50, h:22, body:C.tan,    roof:C.tan,     wheel:C.darkGray },
    { w:38, h:16, body:C.yellow, roof:C.orange,  wheel:C.darkGray },
  ];
  const c = configs[type % configs.length];
  const { w, h, body, roof, wheel } = c;

  // Car shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(x+2, y+h, w-2, 3);

  // Body
  rect(x, y+6, w, h-6, body);
  // Roof
  rect(x+8, y, w-16, 7, roof);
  // Windows
  rect(x+10, y+1, 8, 5, C.ltBlue);
  rect(x+w-18, y+1, 8, 5, C.ltBlue);
  // Headlights
  rect(x+w-4, y+7, 3, 3, C.cream);
  rect(x+1, y+7, 3, 3, C.cream);
  // Bumpers
  rect(x, y+h-6, 4, 4, C.gray);
  rect(x+w-4, y+h-6, 4, 4, C.gray);
  // Wheels (animate)
  const wOff = (frame % 4);
  rect(x+5, y+h-5, 8, 8, wheel);
  rect(x+5+1, y+h-5+1, 6, 6, C.gray);
  rect(x+w-13, y+h-5, 8, 8, wheel);
  rect(x+w-13+1, y+h-5+1, 6, 6, C.gray);
  // Hubcaps
  rect(x+7+wOff%2, y+h-3, 2, 2, C.white);
  rect(x+w-11+wOff%2, y+h-3, 2, 2, C.white);

  // Black outline
  border(x, y+6, w, h-6, C.black);
}

// ── DRAW FLYING CAR ───────────────────────────────────────────────────────────
function drawFlyingCar(x, y, type, frame) {
  x = Math.floor(x); y = Math.floor(y);
  const colors = [C.purple, C.teal, C.orange, C.pink];
  const body = colors[type % colors.length];
  const w = 36, h = 16;

  // Motion blur lines behind
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(x+w, y+4, 20, 2);
  ctx.fillRect(x+w, y+8, 14, 2);

  // Hover glow
  ctx.fillStyle = 'rgba(100,200,255,0.3)';
  ctx.fillRect(x+4, y+h, w-8, 3);

  rect(x, y+5, w, h-5, body);
  rect(x+6, y, w-12, 6, body);
  rect(x+8, y+1, 7, 4, C.ltBlue);
  rect(x+w-15, y+1, 7, 4, C.ltBlue);
  rect(x+w-3, y+6, 3, 3, C.cream);
  // Jet flames
  const flameH = 2 + frame % 3;
  ctx.fillStyle = C.orange;
  ctx.fillRect(x+8, y+h, 5, flameH);
  ctx.fillRect(x+w-13, y+h, 5, flameH);
  ctx.fillStyle = C.yellow;
  ctx.fillRect(x+9, y+h, 3, flameH-1);

  border(x, y+5, w, h-5, C.black);
}

// ── DRAW DOLLAR BILL (18×10 px) ──────────────────────────────────────────────
function drawDollarBill(x, y, t) {
  const bob = Math.sin(t * 4 + x * 0.05) * 2;
  x = Math.floor(x); y = Math.floor(y + bob);
  // Bill body
  ctx.fillStyle = '#2d7a2d'; ctx.fillRect(x,   y,   18, 10);
  // Inner lighter rectangle
  ctx.fillStyle = '#3da83d'; ctx.fillRect(x+2, y+2, 14,  6);
  // Dark border
  ctx.strokeStyle = '#1a4d1a'; ctx.lineWidth = 1;
  ctx.strokeRect(x+0.5, y+0.5, 17, 9);
  // White oval border around center
  ctx.strokeStyle = '#c8f0c8'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.ellipse(x+9, y+5, 4, 3, 0, 0, Math.PI*2); ctx.stroke();
  // $ — vertical bar
  ctx.fillStyle = C.white;
  ctx.fillRect(x+8, y+1, 2, 8);
  // $ — top and bottom arcs (S shape)
  ctx.fillRect(x+6, y+2, 5, 1);
  ctx.fillRect(x+6, y+4, 5, 1);
  ctx.fillRect(x+6, y+6, 5, 1);
  ctx.fillStyle = '#3da83d';  // erase corners to make S curves
  ctx.fillRect(x+10, y+2, 1, 1);
  ctx.fillRect(x+6,  y+6, 1, 1);
  // Corner serifs (cream dots, like ornate bill corners)
  ctx.fillStyle = '#c8f0c8';
  ctx.fillRect(x+1,  y+1,  2, 2);
  ctx.fillRect(x+15, y+1,  2, 2);
  ctx.fillRect(x+1,  y+7,  2, 2);
  ctx.fillRect(x+15, y+7,  2, 2);
}

// ── DRAW CHLOE (front-facing skier, 16×24 px bounding box) ───────────────────
function drawChloe(x, y, frame) {
  x = Math.floor(x); y = Math.floor(y);
  const f = frame % 4;

  // Ground shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(x - 13, y + 14, 26, 3);

  // Skis (horizontal, extend left/right of feet)
  rect(x - 13, y + 13, 26, 2, '#aabbdd');
  rect(x - 14, y + 12,  3, 2, '#8899bb'); // left tip (curved)
  rect(x + 11, y + 12,  3, 2, '#8899bb'); // right tip
  // Ski bindings
  rect(x - 5,  y + 10,  4, 3, '#442200');
  rect(x + 1,  y + 10,  4, 3, '#442200');

  // Ski pants (dark blue)
  rect(x - 4, y + 4, 3, 7, '#334488');
  rect(x + 1, y + 4, 3, 7, '#334488');

  // Jacket (hot pink)
  rect(x - 5, y - 4, 10, 9, '#ee3399');
  // Jacket collar/zipper
  rect(x - 1, y - 4, 2, 5, '#cc1177');

  // Arms (slight pole-push animation)
  const poleOff = (f === 1 || f === 3) ? 1 : 0;
  rect(x - 9, y - 3, 4, 4, '#ee3399'); // left arm
  rect(x + 5, y - 3, 4, 4, '#ee3399'); // right arm

  // Ski poles (silver)
  rect(x - 8, y + 1 + poleOff,     1, 12 - poleOff, '#bbbbbb');
  rect(x + 8, y + 1,               1, 12,            '#bbbbbb');
  // Pole baskets (crossbar at bottom)
  rect(x - 10, y + 12 + poleOff,   3, 1, '#888888');
  rect(x +  7, y + 12,             3, 1, '#888888');

  // Helmet (bright pink)
  rect(x - 5, y - 12, 10, 9, '#ff44aa');
  // Helmet visor brim
  rect(x - 6, y -  4, 12, 2, '#cc2288');

  // Goggles (cyan stripe)
  rect(x - 4, y - 11, 8, 3, '#22ccee');

  // Face (skin)
  rect(x - 3, y - 9, 6, 5, C.skin);

  // Eyes (under goggles)
  rect(x - 2, y - 9, 2, 1, '#223399');
  rect(x + 1, y - 9, 2, 1, '#223399');

  // Smile
  rect(x - 1, y - 6, 3, 1, '#cc7755');

  // Pigtails (brown hair peeking out helmet sides)
  rect(x - 7, y - 11, 2, 6, C.brown);
  rect(x - 8, y -  8, 2, 4, C.brown);
  rect(x + 5, y - 11, 2, 6, C.brown);
  rect(x + 6, y -  8, 2, 4, C.brown);
}

// ── DRAW PINE TREE (snowy, ~26×38 px) ────────────────────────────────────────
function drawPineTree(x, y) {
  x = Math.floor(x); y = Math.floor(y);
  // Trunk
  rect(x - 2, y,      4, 8, '#5c3317');
  // Drop shadow
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.fillRect(x - 14, y - 2, 28, 6);
  // Bottom layer (widest)
  rect(x - 12, y - 9,  24, 11, '#2a5e2a');
  rect(x - 11, y - 9,  22,  3, '#ddeeff'); // snow on top
  rect(x - 10, y - 9,  20,  1, '#eef5ff'); // bright snow highlight
  // Middle layer
  rect(x -  8, y - 18, 16, 10, '#2a5e2a');
  rect(x -  7, y - 18, 14,  3, '#ddeeff');
  rect(x -  6, y - 18, 12,  1, '#eef5ff');
  // Top layer
  rect(x -  4, y - 25,  8,  8, '#2a5e2a');
  rect(x -  3, y - 25,  6,  3, '#ddeeff');
  rect(x -  2, y - 25,  4,  1, '#eef5ff');
  // Tip
  rect(x -  2, y - 32,  4,  8, '#2a5e2a');
  rect(x -  1, y - 33,  2,  2, '#ddeeff');
}

// ── DRAW MOUNTAIN LODGE (goal, ~100×80 px) ────────────────────────────────────
function drawMountainLodge(x, y) {
  x = Math.floor(x); y = Math.floor(y);
  // Warm ambient glow
  ctx.fillStyle = 'rgba(255,180,60,0.10)';
  ctx.fillRect(x - 70, y - 70, 140, 130);
  // Foundation
  rect(x - 46, y + 10, 92, 8, '#6b4a2a');
  // Main building walls
  rect(x - 42, y - 30, 84, 42, '#9a6a42');
  // Wall detail (log lines)
  for (let wy = y - 24; wy < y + 10; wy += 6) {
    rect(x - 40, wy, 78, 1, 'rgba(0,0,0,0.15)');
  }
  // A-frame roof
  rect(x - 52, y - 52, 104, 24, '#5a3820');
  rect(x - 50, y - 52, 100,  8, '#ddeeff'); // snow on roof
  rect(x - 48, y - 44,  96,  4, '#eef5ff'); // bright snow edge
  // Chimney
  rect(x + 22, y - 66,  8, 20, '#7a4830');
  rect(x + 21, y - 68, 10,  4, '#5a3820');
  // Smoke puffs
  ctx.fillStyle = 'rgba(200,200,200,0.45)';
  ctx.beginPath(); ctx.arc(x + 26, y - 72, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 29, y - 78, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 27, y - 83, 2, 0, Math.PI * 2); ctx.fill();
  // Windows (warm glow)
  rect(x - 34, y - 24, 14, 13, '#ffe880');
  rect(x + 20, y - 24, 14, 13, '#ffe880');
  border(x - 34, y - 24, 14, 13, '#aa8820');
  border(x + 20, y - 24, 14, 13, '#aa8820');
  // Window cross-panes
  rect(x - 28, y - 24,  1, 13, '#aa8820');
  rect(x - 34, y - 18, 14,  1, '#aa8820');
  rect(x + 26, y - 24,  1, 13, '#aa8820');
  rect(x + 20, y - 18, 14,  1, '#aa8820');
  // Door arch + door
  ctx.fillStyle = '#5c3010';
  ctx.beginPath(); ctx.arc(x, y - 16, 10, Math.PI, 0); ctx.fill();
  rect(x - 10, y - 16, 20, 26, '#5c3010');
  border(x - 10, y - 16, 20, 26, '#3a1e08');
  // Door handle
  rect(x + 4, y - 4, 3, 3, '#cc9933');
  // Lodge sign
  rect(x - 22, y - 38, 44, 10, '#cc9944');
  border(x - 22, y - 38, 44, 10, '#8a6620');
  drawText('LODGE', x, y - 35, '#3a1e08', 1, 'center');
  border(x - 42, y - 30, 84, 42, '#5c3010');
}

// ── DRAW GAS STATION ─────────────────────────────────────────────────────────
function drawGasStation(x, y) {
  x = Math.floor(x); y = Math.floor(y);
  // Building
  rect(x, y, 70, 60, C.cream);
  rect(x, y, 70, 8, C.red);
  // Sign
  rect(x+5, y+10, 60, 14, C.white);
  border(x+5, y+10, 60, 14, C.black);
  drawText('GAS', x+8, y+13, C.red, 2);
  // Door
  rect(x+25, y+35, 20, 25, C.ltBlue);
  border(x+25, y+35, 20, 25, C.black);
  rect(x+33, y+46, 4, 4, C.yellow);
  // Window
  rect(x+5, y+35, 16, 16, C.ltBlue);
  border(x+5, y+35, 16, 16, C.black);
  // Pump
  rect(x+55, y+25, 12, 30, C.gray);
  rect(x+56, y+27, 10, 15, C.white);
  rect(x+57, y+29, 8, 10, C.ltBlue);
  rect(x+60, y+40, 4, 4, C.red);
  rect(x+61, y+18, 2, 8, C.darkGray);
  // Canopy
  rect(x-10, y-20, 90, 5, C.red);
  rect(x+10, y-20, 4, 20, C.gray);
  rect(x+56, y-20, 4, 20, C.gray);
  border(x, y, 70, 60, C.black);
}

// ── DRAW FAMILY CAR (broken down) ────────────────────────────────────────────
function drawFamilyCar(x, y) {
  x = Math.floor(x); y = Math.floor(y);
  const w = 64, h = 24;
  rect(x, y+8, w, h-8, C.tan);
  rect(x+8, y, w-16, 9, C.tan);

// ── DRAW HEARTS (health) ──────────────────────────────────────────────────────
function drawHeart(x, y, filled) {
  ctx.fillStyle = filled ? C.red : C.darkGray;
  // 7x6 heart
  const hpx = [[1,0],[2,0],[4,0],[5,0],[0,1],[1,1],[2,1],[3,1],[4,1],[5,1],[6,1],
                [0,2],[1,2],[2,2],[3,2],[4,2],[5,2],[6,2],
                [1,3],[2,3],[3,3],[4,3],[5,3],[2,4],[3,4],[4,4],[3,5]];
  for (const [px,py] of hpx) {
    ctx.fillRect(x+px, y+py, 1, 1);
  }
}

// ── DRAW STAR (decorative) ────────────────────────────────────────────────────
function drawStar(x, y, size, color) {
  ctx.fillStyle = color;
  const pts = [];
  for (let i=0; i<5; i++) {
    const outerA = (i*2*Math.PI/5) - Math.PI/2;
    const innerA = outerA + Math.PI/5;
    pts.push([x + Math.cos(outerA)*size, y + Math.sin(outerA)*size]);
    pts.push([x + Math.cos(innerA)*size*0.4, y + Math.sin(innerA)*size*0.4]);
  }
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i=1; i<pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath(); ctx.fill();
}

// SCENE: LEVEL SELECT
// ═══════════════════════════════════════════════════════════════════════════════
const LevelSelectScene = {
  selected: 0,
  t: 0,
  levels: [
    { name: 'LEVEL 1', sub: 'HIGHWAY TO GAS',  locked: false, color: C.green  },
    { name: 'LEVEL 2', sub: 'SKI TO THE LODGE', locked: false, color: C.ltBlue },
    { name: 'LEVEL 3', sub: 'COMING SOON',      locked: true,  color: C.darkGray },
  ],
  init() { this.selected = 0; this.t = 0; },
  update(dt) {
    this.t += dt;
    if (consumeKey('ArrowUp') || consumeKey('ArrowLeft')) {
      do { this.selected = (this.selected - 1 + this.levels.length) % this.levels.length; }
      while (this.levels[this.selected].locked && this.selected !== 0);
    }
    if (consumeKey('ArrowDown') || consumeKey('ArrowRight')) {
      do { this.selected = (this.selected + 1) % this.levels.length; }
      while (this.levels[this.selected].locked);
    }
    if (consumeKey('Enter') || consumeKey('Space')) {
      if (!this.levels[this.selected].locked) {
        if      (this.selected === 0) setScene(Level1Scene);
        else if (this.selected === 1) setScene(Level2StoryScene);
      }
    }
    if (consumeKey('KeyH')) setScene(HighScoreScene);
    if (consumeKey('Escape')) setScene(TitleScene);
  },
  draw() {
    rect(0, 0, BASE_W, BASE_H, '#0d1b2a');
    // Background road stripes
    for (let i=0; i<BASE_W; i+=40) {
      rect((i + this.t*20) % (BASE_W+40) - 20, BASE_H-30, 20, 4, 'rgba(255,255,0,0.1)');
    }
    rect(0, BASE_H-40, BASE_W, 40, 'rgba(0,0,0,0.4)');

    drawText('SELECT LEVEL', BASE_W/2, 20, C.yellow, 2, 'center');

    for (let i=0; i<this.levels.length; i++) {
      const lv = this.levels[i];
      const bx = BASE_W/2 - 90;
      const by = 55 + i*60;
      const bw = 180, bh = 48;
      const isSelected = i === this.selected;

      // Card
      const cardColor = isSelected ? lv.color : 'rgba(30,30,50,0.9)';
      rect(bx, by, bw, bh, cardColor);
      border(bx, by, bw, bh, isSelected ? C.white : lv.color);
      if (isSelected) border(bx+2, by+2, bw-4, bh-4, 'rgba(255,255,255,0.3)');

      if (lv.locked) {
        drawText('LOCKED', BASE_W/2, by+14, C.gray, 2, 'center');
        drawText(lv.sub, BASE_W/2, by+32, C.darkGray, 1, 'center');
        // Lock icon
        rect(BASE_W/2-3, by+15, 6, 5, C.gray);
        rect(BASE_W/2-2, by+12, 4, 4, 'rgba(0,0,0,0)');
        ctx.strokeStyle = C.gray; ctx.lineWidth=1;
        ctx.beginPath(); ctx.arc(BASE_W/2, by+15, 3, Math.PI, 0); ctx.stroke();
      } else {
        drawText(lv.name, BASE_W/2, by+10, isSelected ? C.white : lv.color, 2, 'center');
        drawText(lv.sub, BASE_W/2, by+30, isSelected ? C.cream : C.gray, 1, 'center');
        // Best score
        const scores = loadScores();
        if (scores.length > 0) {
          drawText('BEST: ' + formatScore(scores[0].score) + ' PTS', BASE_W/2, by+40, isSelected ? C.yellow : C.gray, 1, 'center');
        }
      }
    }

    drawText('H - HIGHSCORES', BASE_W/2, BASE_H-28, C.gray, 1, 'center');
    drawText('ESC - TITLE', BASE_W/2, BASE_H-18, C.gray, 1, 'center');

    // Arrow indicators
    if (Math.floor(this.t*2)%2) {
      drawText('>', bx=BASE_W/2 - 98, 55+this.selected*60+16, C.white, 2);
    }
  }
};

// SCENE: INITIALS ENTRY
// ═══════════════════════════════════════════════════════════════════════════════
const InitialsScene = {
  initials: ['A','A','A'],
  cursor: 0,
  score: 0,
  t: 0,
  done: false,
  init() {
    this.initials = ['A','A','A'];
    this.cursor = 0;
    this.t = 0;
    this.done = false;
  },
  setScore(pts) { this.score = pts; },
  update(dt) {
    this.t += dt;
    if (this.done) return;
    if (consumeKey('ArrowUp')) {
      const ch = this.initials[this.cursor];
      const code = ch.charCodeAt(0);
      this.initials[this.cursor] = String.fromCharCode(code < 90 ? code+1 : 65);
    }
    if (consumeKey('ArrowDown')) {
      const ch = this.initials[this.cursor];
      const code = ch.charCodeAt(0);
      this.initials[this.cursor] = String.fromCharCode(code > 65 ? code-1 : 90);
    }
    if (consumeKey('ArrowRight') || consumeKey('Enter')) {
      if (this.cursor < 2) {
        this.cursor++;
      } else {
        // Submit
        addScore(this.initials.join(''), this.score);
        this.done = true;
        setTimeout(() => setScene(HighScoreScene), 1500);
      }
    }
    if (consumeKey('ArrowLeft') && this.cursor > 0) this.cursor--;
  },
  draw() {
    rect(0, 0, BASE_W, BASE_H, '#0a0a1a');
    border(20, 20, BASE_W-40, BASE_H-40, C.yellow);

    drawText('NEW HIGH SCORE!', BASE_W/2, 35, C.yellow, 2, 'center');
    drawText('YOUR SCORE: ' + formatScore(this.score) + ' PTS', BASE_W/2, 60, C.white, 1, 'center');
    drawText('ENTER YOUR INITIALS', BASE_W/2, 85, C.gray, 1, 'center');

    // Initials display
    for (let i=0; i<3; i++) {
      const ix = BASE_W/2 - 30 + i*30;
      const iy = 110;
      const isActive = i === this.cursor && !this.done;
      rect(ix-2, iy-2, 24, 24, isActive ? 'rgba(255,220,0,0.2)' : 'rgba(255,255,255,0.05)');
      border(ix-2, iy-2, 24, 24, isActive ? C.yellow : C.gray);
      drawText(this.initials[i], ix+2, iy+3, isActive ? C.yellow : C.white, 3);
      if (isActive && Math.floor(this.t*3)%2) {
        rect(ix, iy+20, 20, 2, C.yellow);
      }
    }

    if (!this.done) {
      drawText('UP/DOWN: CHANGE LETTER', BASE_W/2, 155, C.gray, 1, 'center');
      drawText('RIGHT/ENTER: NEXT / CONFIRM', BASE_W/2, 167, C.gray, 1, 'center');
      drawText('LEFT: BACK', BASE_W/2, 179, C.gray, 1, 'center');
    } else {
      drawText('SCORE SAVED!', BASE_W/2, 160, C.green, 2, 'center');
    }

    // Stars
    for (let i=0;i<7;i++) {
      drawStar(30+i*60, 220, 5+Math.sin(this.t*2+i)*2, C.yellow);
    }
  }
};

const Level1Scene = {

  elapsed: 0,
  finished: false,
  finishTimer: 0,
  showBonusPrompt: false,

  dollarScore: 0,
  lifeBonus: 0,

  gameElapsed: 0,
  nextCarSpawnTime: 0,

  cloudX: [],
  bgTreeX: [],

  // HUD flash
  hitFlash: 0,

  init() {
    // groundY must be set first so px/py can reference it
    this.groundY = BASE_H - 50;

    // Start Connor on the ground just to the right of the family car (world x≈84)
    this.px = 100;
    this.py = this.groundY - 20; // feet on ground immediately, no falling
    this.pvx = 0; this.pvy = 0;
    this.onGround = true;
    this.facingRight = true;
    this.health = 3;
    this.invincible = 0;
    this.walkFrame = 0;
    this.walkTimer = 0;
    this.hasGasCan = false;
    this.scrollX = 0;
    this.groundCars = [];
    this.flyingCars = [];
    this.reachedStation = false;
    this.runningBack = false;
    this.runBackScrollX = 0;
    this.startTime = 0;  // set when player first moves
    this.elapsed = 0;
    this.finished = false;
    this.finishTimer = 0;
    this.showBonusPrompt = false;
    this.score = 0;
    this.dollarScore = 0;
    this.lifeBonus = 0;
    this.finalScore = 0;
    this.dollars = [];
    this.gameStarted = false;
    this.gameElapsed = 0;
    this.nextCarSpawnTime = 2.0; // first car 2 s after player starts moving
    this.hitFlash = 0;
    this.cloudX = [];
    this.bgTreeX = [];

    // Clouds
    for (let i=0; i<8; i++) {
      this.cloudX.push({ x: 100 + i*550, y: 20 + Math.random()*40, w: 40+Math.random()*30, speed: 0.2+Math.random()*0.1 });
    }
    // Place 20 dollars spread across the level
    this.placeDollars();
  },

    const type = Math.floor(Math.random()*5);
    const configs = [40,52,44,50,38];
    const w = configs[type];
    const speed = 1.5 + Math.random()*1.5;
    this.groundCars.push({ wx, w, type, speed, frame: 0 });
  },

  spawnFlyingCar(wx) {
    const type = Math.floor(Math.random()*4);
    // Flying cars sit just above Connor's head so the player must run UNDER them.
    // Connor running occupies y=200-220 (head at 200); peak jump reaches y=160-180.
    // flyY 165-171 means car bottom is at 181-187 — clears Connor's head (200) by 13-19px
    // but overlaps his jump arc (160-180), so jumping into one deals damage.
    const flyY = this.groundY - 55 + Math.floor(Math.random() * 6); // 165-171
    const speed = 1.8 + Math.random() * 1.5;
    this.flyingCars.push({ wx, flyY, type, speed, frame: 0 });
  },

  placeDollars() {
    const startX = 400;
    const endX = this.gasStationX - 400;
    const spacing = (endX - startX) / 19;
    for (let i = 0; i < 20; i++) {
      const wx = startX + i * spacing + (Math.random() - 0.5) * spacing * 0.6;
      const r = Math.random();
      // 60% ground level (easy), 30% mid-jump (medium), 10% peak-jump (hard but reachable)
      const wy = r < 0.6 ? this.groundY - 12   // 208, easy grab
               : r < 0.9 ? this.groundY - 35   // 185, requires a small jump
               :            this.groundY - 55;  // 165, only reachable at peak jump
      this.dollars.push({ wx, wy, collected: false });
    }
  },

  checkCollision(wx, wy, ww, wh, carX, carY, carW, carH) {
    return wx < carX+carW && wx+ww > carX && wy < carY+carH && wy+wh > carY;
  },

  update(dt) {
    if (this.finished) {
      this.finishTimer += dt;
      if (!this.showBonusPrompt && this.finishTimer > 2.5) {
        this.showBonusPrompt = true;
      }
      if (this.showBonusPrompt) {
        if (consumeKey('Enter') || consumeKey('Space')) {
          BonusIntroScene.fromScore = this.finalScore;
          BonusIntroScene.fromHealth = this.health;
          setScene(BonusIntroScene);
        }
        if (consumeKey('Escape')) {
          if (isHighScore(this.finalScore)) {
            InitialsScene.setScore(this.finalScore);
            setScene(InitialsScene);
          } else {
            setScene(LevelSelectScene);
          }
        }
      }
      return;
    }

    // ── RUNNING BACK TO FAMILY CAR WITH GAS CAN ──
    if (this.runningBack) {
      // Connor runs left at full speed; camera is frozen at runBackScrollX
      this.pvx = -90;
      this.facingRight = false;
      this.px += this.pvx * dt;

      // Keep walk animation ticking
      this.walkTimer += dt;
      if (this.walkTimer > 0.12) { this.walkTimer = 0; this.walkFrame = (this.walkFrame + 1) % 4; }

      // Once Connor exits the left edge of the frozen screen, show level complete
      if (this.px < this.runBackScrollX - 20) {
        this.runningBack = false;
        this.finished = true;
        this.finishTimer = 0;
      }
      return;
    }

    // Detect first input and start the clock
    if (!this.gameStarted) {
      const anyKey = keys['ArrowRight'] || keys['KeyD'] || keys['ArrowLeft'] || keys['KeyA'] ||
                     keys['Space'] || keys['ArrowUp'] || keys['KeyW'];
      if (anyKey) {
        this.gameStarted = true;
        this.startTime = performance.now();
      }
    }

    if (this.gameStarted) {
      this.elapsed = (performance.now() - this.startTime) / 1000;
      this.gameElapsed += dt;
    }

    this.hitFlash = Math.max(0, this.hitFlash - dt);
    this.invincible = Math.max(0, this.invincible - dt);

    // ── PLAYER MOVEMENT ──
    const SPEED = 90;
    const JUMP_V = -200;
    const GRAVITY = 500;

    this.pvx = 0;
    if (keys['ArrowRight'] || keys['KeyD']) {
      this.pvx = SPEED;
      this.facingRight = true;
    }
    if (keys['ArrowLeft'] || keys['KeyA']) {
      this.pvx = -SPEED * 0.6;
      this.facingRight = false;
    }

    // Jump
    if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && this.onGround) {
      this.pvy = JUMP_V;
      this.onGround = false;
    }

    this.pvy += GRAVITY * dt;
    this.px += this.pvx * dt;
    this.py += this.pvy * dt;

    // Ground collision
    const groundLocal = this.groundY - 20; // player feet Y in screen coords; store world px,py
    if (this.py + 20 >= this.groundY) {
      this.py = this.groundY - 20;
      this.pvy = 0;
      this.onGround = true;
    }

    // Clamp player left boundary
    if (this.px - this.scrollX < 20) this.px = this.scrollX + 20;

    // Walk animation
    if (this.pvx !== 0 && this.onGround) {
      this.walkTimer += dt;
      if (this.walkTimer > 0.12) { this.walkTimer = 0; this.walkFrame = (this.walkFrame+1)%4; }
    } else if (this.onGround) {
      this.walkFrame = 0;
    }

    // ── SCROLL ──
    const targetScroll = this.px - 80;
    this.scrollX += (targetScroll - this.scrollX) * Math.min(1, dt*8);
    this.scrollX = Math.max(0, Math.min(this.worldWidth - BASE_W, this.scrollX));

    // ── COLLECT DOLLARS ──
    for (const d of this.dollars) {
      if (d.collected) continue;
      if (this.checkCollision(this.px - 6, this.py, 12, 20, d.wx, d.wy, 18, 10)) {
        d.collected = true;
        this.score += 100;
        this.dollarScore += 100;
      }
    }
    this.dollars = this.dollars.filter(d => !d.collected && d.wx > this.scrollX - 60);

    // ── SPAWN OBSTACLES (one car every 1-3 s, only after player moves) ──
    if (this.gameStarted && this.gameElapsed >= this.nextCarSpawnTime) {
      const spawnX = Math.floor(this.scrollX + BASE_W + 80);
      if (spawnX < this.gasStationX - 200) {
        if (Math.random() < 0.3) {
          this.spawnFlyingCar(spawnX);
        } else {
          this.spawnGroundCar(spawnX);
        }
      }
      this.nextCarSpawnTime = this.gameElapsed + 1 + Math.random(); // next car in 1-2 s
    }

    // ── UPDATE GROUND CARS ──
    const player_wx = this.px;
    const player_wy = this.py;
    const PW = 12, PH = 20;

    for (const c of this.groundCars) {
      c.wx -= c.speed;
      c.frame++;

      if (this.invincible <= 0) {
        const carScreenY = this.groundY - 24;
        if (this.checkCollision(player_wx-PW/2, player_wy, PW, PH, c.wx-c.w/2, carScreenY, c.w, 24)) {
          this.health--;
          this.invincible = 2.5;
          this.hitFlash = 0.3;
          if (this.health <= 0) this.gameOver();
        }
      }
    }
    this.groundCars = this.groundCars.filter(c => c.wx > this.scrollX - 200);

    // ── UPDATE FLYING CARS ──
    for (const fc of this.flyingCars) {
      fc.wx -= fc.speed;
      fc.frame++;
      const flyY = fc.flyY;

      if (this.invincible <= 0) {
        if (this.checkCollision(player_wx-PW/2, player_wy, PW, PH, fc.wx-18, flyY, 36, 16)) {
          this.health--;
          this.invincible = 2.5;
          this.hitFlash = 0.3;
          if (this.health <= 0) this.gameOver();
        }
      }
    }
    this.flyingCars = this.flyingCars.filter(c => c.wx > this.scrollX - 200);

    // ── CHECK GOAL ──
    if (!this.reachedStation && this.px > this.gasStationX + 10) {
      this.reachedStation = true;
      this.lifeBonus = this.health === 3 ? 500 : this.health === 2 ? 200 : 0;
      this.score += this.lifeBonus;
      this.finalScore = this.score;
      // Clear all obstacles so Connor runs back safely
      this.groundCars = [];
      this.flyingCars = [];
      this.invincible = 999;
      // Lock the camera and send Connor running back to the family car
      this.runBackScrollX = this.scrollX;
      this.runningBack = true;
    }

    // Clouds
    for (const cl of this.cloudX) {
      cl.x -= cl.speed;
      if (cl.x + cl.w < 0) cl.x = BASE_W + cl.w;
    }
  },

  gameOver() {
    GameOverScene.returnScene = Level1Scene;
    GameOverScene.line1 = 'CONNOR GOT KNOCKED DOWN!';
    GameOverScene.line2 = 'THE FAMILY IS STILL WAITING...';
    setScene(GameOverScene);
  },

  draw() {
    const sx = Math.floor(this.scrollX);

    // ── SKY ──
    const skyGrad = ctx.createLinearGradient(0, 0, 0, BASE_H*0.65);
    skyGrad.addColorStop(0, '#87CEEB');
    skyGrad.addColorStop(1, '#d4ecf7');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, BASE_W, BASE_H*0.65);

    // Clouds
    for (const cl of this.cloudX) {
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fillRect(cl.x, cl.y, cl.w, 10);
      ctx.fillRect(cl.x+5, cl.y-6, cl.w-10, 10);
      ctx.fillRect(cl.x+8, cl.y-10, cl.w-20, 8);
    }

    // Far background hills
    ctx.fillStyle = '#a8d5a2';
    for (let i=0; i<6; i++) {
      const hx = ((i*180 - sx*0.1) % (BASE_W+160)) - 40;
      ctx.beginPath(); ctx.arc(hx+50, BASE_H*0.65, 50, 0, Math.PI); ctx.fill();
    }

    // ── ROAD ──
    rect(0, this.groundY - 30, BASE_W, 80, C.road);
    // Shoulder markings
    rect(0, this.groundY - 30, BASE_W, 4, C.shoulder);
    rect(0, this.groundY + 44, BASE_W, 4, C.shoulder);
    // Center dashes (world-scrolled)
    const dashOffset = sx % 40;
    for (let dx=(-dashOffset); dx<BASE_W; dx+=40) {
      rect(dx, this.groundY - 2, 20, 4, C.roadLine);
    }

    // ── FAMILY CAR (stationary at start) ──
    const familyCarX = 0 - sx + 20;
    if (familyCarX > -80 && familyCarX < BASE_W) {
      drawFamilyCar(familyCarX, this.groundY - 24);
    }

    // ── GROUND CARS ──
    for (const c of this.groundCars) {
      const cx = c.wx - sx - c.w/2;
      if (cx > -60 && cx < BASE_W+20) {
        drawCar(cx, this.groundY - 24, c.type, c.frame);
      }
    }

    // ── FLYING CARS ──
    for (const fc of this.flyingCars) {
      const fcx = fc.wx - sx - 18;
      const fcy = fc.flyY;
      if (fcx > -50 && fcx < BASE_W+20) {
        drawFlyingCar(fcx, fcy, fc.type, fc.frame);
      }
    }

    // ── GAS STATION ──
    const gsx = this.gasStationX - sx;
    if (gsx > -80 && gsx < BASE_W+10) {
      drawGasStation(gsx, this.groundY - 60);
      // Arrow pointing to station
      if (gsx > BASE_W - 20) {
        ctx.fillStyle = C.yellow;
        const ax = BASE_W - 20;
        const ay = 30;
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(ax+12, ay+8);
        ctx.lineTo(ax, ay+16);
        ctx.fill();
        drawText('GAS', ax-14, ay+3, C.yellow, 1);
      }
    }

    // ── DISTANCE INDICATOR ──
    if (gsx > BASE_W) {
      const dist = Math.max(0, Math.round((this.gasStationX - this.px) / 10));
      drawText(`${dist}m TO GAS`, BASE_W - 4, 8, C.yellow, 1, 'right');
    }

    // ── PLAYER ──
    const playerScreenX = Math.floor(this.px - sx - 8);
    const playerScreenY = Math.floor(this.py);
    const showPlayer = this.invincible <= 0 || Math.floor(this.invincible * 10) % 2 === 0;
    if (showPlayer) {
      drawConnor(playerScreenX, playerScreenY, this.walkFrame, this.facingRight, this.hasGasCan);
    }

    // ── DOLLARS ──
    const gt = performance.now() / 1000;
    for (const d of this.dollars) {
      if (d.collected) continue;
      const dx = d.wx - sx;
      if (dx > -20 && dx < BASE_W + 20) drawDollarBill(dx, d.wy, gt);
    }

    // ── HUD ──
    // Score (only show once game has started)
    if (this.gameStarted) {
      drawText('$' + formatScore(this.score), BASE_W/2, 6, C.yellow, 1, 'center');
    } else {
      // Waiting-to-start prompt
      if (Math.floor(performance.now() / 500) % 2 === 0) {
        drawText('PRESS ANY KEY TO START', BASE_W/2, BASE_H/2 - 20, C.yellow, 1, 'center');
      }
      drawText('ARROW KEYS TO MOVE  SPACE TO JUMP', BASE_W/2, BASE_H/2 - 8, C.white, 1, 'center');
    }

    // Health hearts
    for (let i=0; i<3; i++) {
      drawHeart(8 + i*14, 6, i < this.health);
    }

    // Hit flash overlay
    if (this.hitFlash > 0) {
      ctx.fillStyle = `rgba(255,0,0,${this.hitFlash/0.3 * 0.3})`;
      ctx.fillRect(0, 0, BASE_W, BASE_H);
    }

    // Invincibility notice
    if (this.invincible > 0 && this.invincible < 2.5) {
      if (Math.floor(this.invincible*4)%2) {
        drawText('!', this.px - sx, this.py - 8, C.red, 2, 'center');
      }
    }

    // ── FINISH OVERLAY ──
    if (this.finished) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, BASE_W, BASE_H);
      drawText('LEVEL COMPLETE!', BASE_W/2, 60, C.yellow, 2, 'center');
      drawText('NICE WORK, CONNOR!', BASE_W/2, 82, C.green, 1, 'center');
      rect(BASE_W/2 - 90, 94, 180, 1, C.gray);
      drawText('DOLLARS:  ' + formatScore(this.dollarScore) + ' PTS', BASE_W/2, 100, C.white, 1, 'center');
      const bonusLabel = this.lifeBonus > 0 ? '+' + this.lifeBonus + ' PTS' : 'NONE';
      const bonusColor = this.lifeBonus > 0 ? C.green : C.gray;
      drawText('LIFE BONUS:  ' + bonusLabel, BASE_W/2, 114, bonusColor, 1, 'center');
      rect(BASE_W/2 - 90, 126, 180, 1, C.gray);
      drawText('TOTAL:  ' + formatScore(this.finalScore) + ' PTS', BASE_W/2, 132, C.yellow, 1, 'center');
      if (this.showBonusPrompt) {
        rect(BASE_W/2 - 110, 148, 220, 1, C.gray);
        if (Math.floor(performance.now() / 500) % 2 === 0) {
          drawText('PRESS ENTER - BONUS LEVEL', BASE_W/2, 156, C.yellow, 1, 'center');
        }
        drawText('PRESS ESC - SKIP TO SCORES', BASE_W/2, 170, C.gray, 1, 'center');
      }
    }
  }
};

// SCENE: GAME OVER
// ═══════════════════════════════════════════════════════════════════════════════
const GameOverScene = {
  t: 0,
  returnScene: null,          // set by the calling level; falls back to Level1Scene
  line1: 'CONNOR GOT KNOCKED DOWN!',
  line2: 'THE FAMILY IS STILL WAITING...',
  init() { this.t = 0; },
  update(dt) {
    this.t += dt;
    if (this.t > 1) {
      if (consumeKey('Enter') || consumeKey('Space')) setScene(this.returnScene || Level1Scene);
      if (consumeKey('Escape')) setScene(LevelSelectScene);
    }
  },
  draw() {
    rect(0, 0, BASE_W, BASE_H, '#1a0000');

    // Animated danger stripes
    const stripe = Math.floor(this.t * 4) % 2;
    for (let i=0; i<BASE_W; i+=20) {
      ctx.fillStyle = stripe ? 'rgba(180,0,0,0.3)' : 'rgba(100,0,0,0.2)';
      ctx.fillRect(i, 0, 10, BASE_H);
    }

    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(30, 70, BASE_W-60, 100);
    border(30, 70, BASE_W-60, 100, C.red);

    drawText('GAME OVER', BASE_W/2, 85, C.red, 3, 'center');
    drawText(this.line1, BASE_W/2, 118, C.white, 1, 'center');
    drawText(this.line2, BASE_W/2, 130, C.gray, 1, 'center');

    if (this.t > 1 && Math.floor(this.t*2)%2) {
      drawText('ENTER - TRY AGAIN', BASE_W/2, 185, C.yellow, 1, 'center');
      drawText('ESC - LEVEL SELECT', BASE_W/2, 197, C.gray, 1, 'center');
    }

    // Broken hearts
    for (let i=0; i<3; i++) {
      drawHeart(BASE_W/2 - 21 + i*14, 150, false);
    }
  }
};

// ═══════════════════════════════════════════════════════════════════════════════
// SCENE: BONUS LEVEL  (infinite highway, escalating speed, ends on death)
// ═══════════════════════════════════════════════════════════════════════════════
const BonusLevelScene = {
  startScore: 0,
  startHealth: 1,

  // Player
  px: 0, py: 0, pvx: 0, pvy: 0,
  onGround: false, facingRight: true,
  walkFrame: 0, walkTimer: 0,
  health: 1, invincible: 0, hitFlash: 0,

  // World
  scrollX: 0, groundY: 0,
  groundCars: [], flyingCars: [],

  // Scoring / collectibles
  score: 0, dollarScore: 0,
  dollars: [], nextDollarSpawnTime: 0,

  // Timing
  gameStarted: false, gameElapsed: 0, nextCarSpawnTime: 0,

  checkCollision(wx, wy, ww, wh, cx2, cy2, cw2, ch2) {
    return wx < cx2+cw2 && wx+ww > cx2 && wy < cy2+ch2 && wy+wh > cy2;
  },

  init() {
    this.groundY = BASE_H - 50;
    this.px = 100;
    this.py = this.groundY - 20;
    this.pvx = 0; this.pvy = 0;
    this.onGround = true; this.facingRight = true;
    this.health = this.startHealth;
    this.invincible = 0; this.hitFlash = 0;
    this.walkFrame = 0; this.walkTimer = 0;
    this.scrollX = 0;
    this.groundCars = []; this.flyingCars = [];
    this.dollars = [];
    this.score = this.startScore;
    this.dollarScore = 0;
    this.gameStarted = false;
    this.gameElapsed = 0;
    this.nextCarSpawnTime = 2.0;
    this.nextDollarSpawnTime = 1.5;
  },

  spawnGroundCar(wx, mult) {
    const type = Math.floor(Math.random()*5);
    const w = [40,52,44,50,38][type];
    const speed = (1.5 + Math.random()*1.5) * mult;
    this.groundCars.push({ wx, w, type, speed, frame: 0 });
  },

  spawnFlyingCar(wx, mult) {
    const type = Math.floor(Math.random()*4);
    const flyY = this.groundY - 55 + Math.floor(Math.random()*6);
    const speed = (1.8 + Math.random()*1.5) * mult;
    this.flyingCars.push({ wx, flyY, type, speed, frame: 0 });
  },

  gameOver() {
    BonusEndScene.finalScore  = this.score;
    BonusEndScene.dollarScore = this.dollarScore;
    setScene(BonusEndScene);
  },

  update(dt) {
    if (!this.gameStarted) {
      const any = keys['ArrowRight']||keys['KeyD']||keys['ArrowLeft']||keys['KeyA']||
                  keys['Space']||keys['ArrowUp']||keys['KeyW'];
      if (any) this.gameStarted = true;
    }
    if (this.gameStarted) this.gameElapsed += dt;

    // Escalating difficulty
    const speedMult    = 1 + this.gameElapsed * 0.04;          // +4%/s; ×2 at 25 s
    const spawnInterval = Math.max(0.25, 1.5 - this.gameElapsed * 0.025); // 1.5 → 0.25 s over 50 s

    // ── PLAYER MOVEMENT ──
    const SPEED = 90, JUMP_V = -200, GRAVITY = 500;
    this.pvx = 0;
    if (keys['ArrowRight']||keys['KeyD']) { this.pvx =  SPEED;       this.facingRight = true;  }
    if (keys['ArrowLeft'] ||keys['KeyA']) { this.pvx = -SPEED * 0.6; this.facingRight = false; }
    if ((keys['Space']||keys['ArrowUp']||keys['KeyW']) && this.onGround) {
      this.pvy = JUMP_V; this.onGround = false;
    }
    this.pvy += GRAVITY * dt;
    this.px  += this.pvx * dt;
    this.py  += this.pvy * dt;
    if (this.py + 20 >= this.groundY) { this.py = this.groundY - 20; this.pvy = 0; this.onGround = true; }
    if (this.px - this.scrollX < 20) this.px = this.scrollX + 20;

    if (this.pvx !== 0 && this.onGround) {
      this.walkTimer += dt;
      if (this.walkTimer > 0.12) { this.walkTimer = 0; this.walkFrame = (this.walkFrame+1)%4; }
    } else if (this.onGround) { this.walkFrame = 0; }

    const targetScroll = this.px - 80;
    this.scrollX += (targetScroll - this.scrollX) * Math.min(1, dt*8);
    if (this.scrollX < 0) this.scrollX = 0;

    if (this.invincible > 0) this.invincible -= dt;
    if (this.hitFlash  > 0) this.hitFlash  -= dt;

    // ── SPAWN DOLLARS ──
    if (this.gameStarted && this.gameElapsed >= this.nextDollarSpawnTime) {
      const r = Math.random();
      const wy = r < 0.6 ? this.groundY - 12 : r < 0.9 ? this.groundY - 35 : this.groundY - 55;
      this.dollars.push({ wx: Math.floor(this.scrollX + BASE_W + 60), wy, collected: false });
      this.nextDollarSpawnTime = this.gameElapsed + 1.5 + Math.random() * 1.5;
    }

    // ── COLLECT DOLLARS ──
    for (const d of this.dollars) {
      if (d.collected) continue;
      if (this.checkCollision(this.px-6, this.py, 12, 20, d.wx, d.wy, 18, 10)) {
        d.collected = true; this.score += 100; this.dollarScore += 100;
      }
    }
    this.dollars = this.dollars.filter(d => !d.collected && d.wx > this.scrollX - 60);

    // ── SPAWN CARS ──
    if (this.gameStarted && this.gameElapsed >= this.nextCarSpawnTime) {
      const sx2 = Math.floor(this.scrollX + BASE_W + 80);
      if (Math.random() < 0.3) this.spawnFlyingCar(sx2, speedMult);
      else                      this.spawnGroundCar(sx2, speedMult);
      this.nextCarSpawnTime = this.gameElapsed + spawnInterval * (0.75 + Math.random()*0.5);
    }

    // ── UPDATE GROUND CARS ──
    const PW = 12, PH = 20;
    for (const c of this.groundCars) {
      c.wx -= c.speed; c.frame++;
      if (this.invincible <= 0) {
        if (this.checkCollision(this.px-PW/2, this.py, PW, PH, c.wx-c.w/2, this.groundY-24, c.w, 24)) {
          this.health--; this.invincible = 2.5; this.hitFlash = 0.3;
          if (this.health <= 0) { this.gameOver(); return; }
        }
      }
    }
    this.groundCars = this.groundCars.filter(c => c.wx > this.scrollX - 200);

    // ── UPDATE FLYING CARS ──
    for (const fc of this.flyingCars) {
      fc.wx -= fc.speed; fc.frame++;
      if (this.invincible <= 0) {
        if (this.checkCollision(this.px-PW/2, this.py, PW, PH, fc.wx-18, fc.flyY, 36, 16)) {
          this.health--; this.invincible = 2.5; this.hitFlash = 0.3;
          if (this.health <= 0) { this.gameOver(); return; }
        }
      }
    }
    this.flyingCars = this.flyingCars.filter(c => c.wx > this.scrollX - 200);
  },

  draw() {
    const sx = this.scrollX;
    const gY = this.groundY;

    // Sky — slightly redder to signal danger
    const grad = ctx.createLinearGradient(0, 0, 0, gY - 30);
    grad.addColorStop(0, '#3a2a4a');
    grad.addColorStop(1, '#b06040');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, BASE_W, gY - 30);

    // Ground / road
    rect(0, gY - 30, BASE_W, 30, C.grass);
    rect(0, gY - 4,  BASE_W,  4, C.shoulder);
    rect(0, gY,      BASE_W, BASE_H - gY, C.road);
    rect(0, BASE_H - 12, BASE_W, 12, C.shoulder);
    const dashOff = sx % 40;
    for (let dx = -dashOff; dx < BASE_W; dx += 40) rect(dx, gY + 10, 20, 4, C.roadLine);

    // Dollars
    const gt = performance.now() / 1000;
    for (const d of this.dollars) {
      if (d.collected) continue;
      const dx = d.wx - sx;
      if (dx > -20 && dx < BASE_W + 20) drawDollarBill(dx, d.wy, gt);
    }

    // Ground cars
    for (const c of this.groundCars) {
      const cx = c.wx - sx - c.w/2;
      if (cx > -60 && cx < BASE_W+20) drawCar(cx, gY - 24, c.type, c.frame);
    }

    // Flying cars
    for (const fc of this.flyingCars) {
      const fx = fc.wx - sx - 18;
      if (fx > -50 && fx < BASE_W+20) drawFlyingCar(fx, fc.flyY, fc.type, fc.frame);
    }

    // Connor (blinks when invincible)
    const psx = Math.floor(this.px - sx - 8);
    const psy = Math.floor(this.py);
    const show = this.invincible <= 0 || Math.floor(this.invincible * 10) % 2 === 0;
    if (show) drawConnor(psx, psy, this.walkFrame, this.facingRight, false);

    // HUD
    for (let i = 0; i < 3; i++) drawHeart(8 + i*14, 6, i < this.health);
    if (this.gameStarted) {
      drawText('$' + formatScore(this.score), BASE_W/2, 6, C.yellow, 1, 'center');
      // Speed gauge — fills with ! as difficulty climbs
      const lvl = Math.min(5, Math.floor(this.gameElapsed / 10) + 1);
      drawText('SPD ' + '!'.repeat(lvl), BASE_W - 4, 6, lvl >= 4 ? C.red : C.orange, 1, 'right');
    } else {
      if (Math.floor(performance.now() / 500) % 2 === 0)
        drawText('PRESS ANY KEY TO START', BASE_W/2, BASE_H/2 - 20, C.yellow, 1, 'center');
      drawText('ARROW KEYS TO MOVE  SPACE TO JUMP', BASE_W/2, BASE_H/2 - 8, C.white, 1, 'center');
    }

    if (this.hitFlash > 0) {
      ctx.fillStyle = `rgba(255,0,0,${this.hitFlash/0.3 * 0.3})`;
      ctx.fillRect(0, 0, BASE_W, BASE_H);
    }
    if (this.invincible > 0 && this.invincible < 2.5) {
      if (Math.floor(this.invincible*4)%2)
        drawText('!', this.px - sx, this.py - 8, C.red, 2, 'center');
    }
  },
};

// ═══════════════════════════════════════════════════════════════════════════════
// SCENE: LEVEL 2  — Chloe skis down the mountain
// ═══════════════════════════════════════════════════════════════════════════════
const LVL2_CHLOE_Y = 100;  // Chloe's fixed screen-Y (trees approach from below)
const LVL2_GOAL_Y  = 5600; // total mountain height in world units

const Level2Scene = {
  // Chloe state
  chloeX: 0, walkFrame: 0, walkTimer: 0,
  movingLeft: false, movingRight: false,
  health: 3, invincible: 0, hitFlash: 0,

  // World scroll
  scrollY: 0, scrollSpeed: 80,

  // Game flow
  gameStarted: false, gameElapsed: 0,
  finished: false, finishTimer: 0, showEndPrompt: false,

  // Scoring
  score: 0, dollarScore: 0, lifeBonus: 0, finalScore: 0,

  // Obstacles & collectibles
  trees: [], dollars: [], nextTreeWY: 0,

  // ── helpers ─────────────────────────────────────────────
  collide(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  },

  placeDollars() {
    this.dollars = [];
    const startWY = 600, endWY = LVL2_GOAL_Y - 400;
    const step = (endWY - startWY) / 19;
    for (let i = 0; i < 20; i++) {
      const wy = startWY + i * step + (Math.random() - 0.5) * step * 0.5;
      const wx = 30 + Math.random() * (BASE_W - 60);
      this.dollars.push({ wx, wy, collected: false });
    }
  },

  gameOver() {
    GameOverScene.returnScene = Level2Scene;
    GameOverScene.line1 = 'CHLOE HIT A TREE!';
    GameOverScene.line2 = 'THE FAMILY IS STILL STRANDED...';
    setScene(GameOverScene);
  },

  // ── init ────────────────────────────────────────────────
  init() {
    this.chloeX = BASE_W / 2;
    this.walkFrame = 0; this.walkTimer = 0;
    this.movingLeft = false; this.movingRight = false;
    this.health = 3; this.invincible = 0; this.hitFlash = 0;
    this.scrollY = 0; this.scrollSpeed = 80;
    this.gameStarted = false; this.gameElapsed = 0;
    this.finished = false; this.finishTimer = 0; this.showEndPrompt = false;
    this.score = 0; this.dollarScore = 0; this.lifeBonus = 0; this.finalScore = 0;
    this.trees = [];
    // start trees a bit below the lodge platform — first tree at world-Y 280
    this.nextTreeWY = 280;
    this.placeDollars();
  },

  // ── update ──────────────────────────────────────────────
  update(dt) {
    // ── FINISHED overlay ──────────────────────────────────
    if (this.finished) {
      this.finishTimer += dt;
      if (!this.showEndPrompt && this.finishTimer > 2.5) this.showEndPrompt = true;
      if (this.showEndPrompt) {
        if (consumeKey('Enter') || consumeKey('Space')) {
          if (isHighScore(this.finalScore)) {
            InitialsScene.setScore(this.finalScore);
            setScene(InitialsScene);
          } else {
            setScene(LevelSelectScene);
          }
        }
        if (consumeKey('Escape')) setScene(LevelSelectScene);
      }
      return;
    }

    // ── Wait for first input to start scrolling ───────────
    if (!this.gameStarted) {
      if (keys['ArrowLeft'] || keys['KeyA'] || keys['ArrowRight'] || keys['KeyD']) {
        this.gameStarted = true;
      }
    }

    if (this.gameStarted) {
      this.gameElapsed += dt;
      // Difficulty ramp: 80 → 220 px/s over ~35 s
      this.scrollSpeed = Math.min(220, 80 + this.gameElapsed * 4);
      this.scrollY += this.scrollSpeed * dt;
    }

    if (this.invincible > 0) this.invincible -= dt;
    if (this.hitFlash  > 0) this.hitFlash  -= dt;

    // ── Chloe movement (left/right only) ─────────────────
    const MOVE_SPEED = 170;
    let dx = 0;
    this.movingLeft  = !!(keys['ArrowLeft']  || keys['KeyA']);
    this.movingRight = !!(keys['ArrowRight'] || keys['KeyD']);
    if (this.movingLeft)  dx -= MOVE_SPEED * dt;
    if (this.movingRight) dx += MOVE_SPEED * dt;
    this.chloeX = Math.max(18, Math.min(BASE_W - 18, this.chloeX + dx));

    // Walk animation
    if (dx !== 0) {
      this.walkTimer += dt;
      if (this.walkTimer > 0.12) { this.walkTimer = 0; this.walkFrame = (this.walkFrame + 1) % 4; }
    } else {
      this.walkFrame = 0;
    }

    // ── Spawn trees ahead of Chloe ───────────────────────
    // Trees spawn at screen bottom → screen_y = LVL2_CHLOE_Y + (wy - scrollY)
    // Screen bottom is BASE_H, so wy_at_bottom = scrollY + (BASE_H - LVL2_CHLOE_Y)
    const spawnAheadWY = this.scrollY + (BASE_H - LVL2_CHLOE_Y) + 30;
    const baseSpacing = Math.max(44, 155 - this.gameElapsed * 2.2);
    while (this.nextTreeWY < spawnAheadWY) {
      const wx = 22 + Math.random() * (BASE_W - 44);
      this.trees.push({ wx, wy: this.nextTreeWY });
      this.nextTreeWY += baseSpacing + Math.random() * baseSpacing * 0.5;
    }

    // ── Collide with trees ────────────────────────────────
    const cTop  = LVL2_CHLOE_Y - 14; // Chloe hitbox top (screen coords)
    const cLeft = this.chloeX - 7;
    for (const t of this.trees) {
      const tsy = t.wy - this.scrollY + LVL2_CHLOE_Y;
      // Only test trees near Chloe's Y band
      if (tsy < cTop - 10 || tsy > cTop + 36) continue;
      if (this.invincible > 0) continue;
      if (this.collide(cLeft, cTop, 14, 22, t.wx - 11, tsy - 14, 22, 22)) {
        this.health--;
        this.invincible = 2.0;
        this.hitFlash   = 0.3;
        if (this.health <= 0) { this.gameOver(); return; }
      }
    }
    // Prune trees that have scrolled well above the screen
    this.trees = this.trees.filter(t => t.wy > this.scrollY - 80);

    // ── Collect dollars ───────────────────────────────────
    for (const d of this.dollars) {
      if (d.collected) continue;
      const dsy = d.wy - this.scrollY + LVL2_CHLOE_Y;
      if (this.collide(cLeft, cTop, 14, 22, d.wx - 9, dsy - 5, 18, 10)) {
        d.collected = true;
        this.score      += 100;
        this.dollarScore += 100;
      }
    }

    // ── Check goal (reached the lodge) ───────────────────
    if (!this.finished && this.scrollY >= LVL2_GOAL_Y) {
      this.lifeBonus = this.health === 3 ? 500 : this.health === 2 ? 200 : 0;
      this.score += this.lifeBonus;
      this.finalScore = this.score;
      this.finished = true;
      this.finishTimer = 0;
    }
  },

  // ── draw ────────────────────────────────────────────────
  draw() {
    const sy = this.scrollY;
    const gt = performance.now() / 1000;

    // ── Background: snowy slope ───────────────────────────
    // Base sky/snow — brightens slightly as we descend toward valley
    const prog = Math.min(1, sy / LVL2_GOAL_Y);
    const r = Math.floor(180 + (230 - 180) * prog);
    const g = Math.floor(210 + (245 - 210) * prog);
    const b = Math.floor(240 + (255 - 240) * prog);
    rect(0, 0, BASE_W, BASE_H, `rgb(${r},${g},${b})`);

    // Subtle snow texture (horizontal streaks, slow parallax)
    const lineOff = (sy * 0.25) % 40;
    for (let ly = -lineOff; ly < BASE_H; ly += 40) {
      ctx.fillStyle = 'rgba(180,210,240,0.12)';
      ctx.fillRect(0, Math.floor(ly), BASE_W, 2);
    }

    // Distant mountain silhouettes on horizon (parallax ×0.04)
    ctx.fillStyle = 'rgba(140,175,210,0.30)';
    const mOff = (sy * 0.04) % 160;
    for (let i = -1; i < 5; i++) {
      const mx = i * 160 - mOff;
      ctx.beginPath();
      ctx.moveTo(mx,        BASE_H * 0.55);
      ctx.lineTo(mx + 50,   BASE_H * 0.20);
      ctx.lineTo(mx + 100,  BASE_H * 0.40);
      ctx.lineTo(mx + 160,  BASE_H * 0.55);
      ctx.closePath(); ctx.fill();
    }

    // ── Dollar bills ─────────────────────────────────────
    for (const d of this.dollars) {
      if (d.collected) continue;
      const dsy = d.wy - sy + LVL2_CHLOE_Y;
      if (dsy > -20 && dsy < BASE_H + 20) drawDollarBill(d.wx, dsy, gt);
    }

    // ── Trees ────────────────────────────────────────────
    for (const t of this.trees) {
      const tsy = t.wy - sy + LVL2_CHLOE_Y;
      if (tsy > -38 && tsy < BASE_H + 12) drawPineTree(t.wx, tsy);
    }

    // ── Lodge (goal) ──────────────────────────────────────
    const lodgeSY = LVL2_GOAL_Y - sy + LVL2_CHLOE_Y;
    if (lodgeSY > -80 && lodgeSY < BASE_H + 80) {
      drawMountainLodge(BASE_W / 2, lodgeSY);
    }

    // ── Distance-to-lodge HUD hint ────────────────────────
    if (!this.finished && lodgeSY > BASE_H + 20) {
      const metersLeft = Math.max(0, Math.round((LVL2_GOAL_Y - sy) / 10));
      drawText(metersLeft + 'M TO LODGE', BASE_W / 2, 6, C.ltBlue, 1, 'center');
    }

    // ── Ski trails (aesthetic) ────────────────────────────
    if (this.gameStarted && !this.finished) {
      ctx.fillStyle = 'rgba(140,175,220,0.35)';
      ctx.fillRect(Math.floor(this.chloeX) - 4, LVL2_CHLOE_Y + 14, 2, 22);
      ctx.fillRect(Math.floor(this.chloeX) + 2, LVL2_CHLOE_Y + 14, 2, 22);
    }

    // ── Chloe (blinks while invincible) ──────────────────
    const showChloe = this.invincible <= 0 || Math.floor(this.invincible * 10) % 2 === 0;
    if (showChloe) drawChloe(this.chloeX, LVL2_CHLOE_Y, this.walkFrame);

    // ── HUD: hearts ──────────────────────────────────────
    for (let i = 0; i < 3; i++) drawHeart(8 + i * 14, 6, i < this.health);

    // ── HUD: score ───────────────────────────────────────
    if (this.gameStarted) {
      drawText('$' + formatScore(this.score), BASE_W / 2, 6, C.yellow, 1, 'center');
    } else {
      if (Math.floor(performance.now() / 500) % 2 === 0)
        drawText('PRESS LEFT/RIGHT TO START', BASE_W / 2, BASE_H / 2 - 6, C.yellow, 1, 'center');
    }

    // ── HUD: progress bar (right side) ───────────────────
    const barX = BASE_W - 10, barY = 22, barH2 = BASE_H - 44;
    rect(barX, barY, 6, barH2, 'rgba(0,0,0,0.25)');
    const filled = Math.round(barH2 * prog);
    rect(barX, barY + barH2 - filled, 6, filled, C.ltBlue);
    // Marker dot
    rect(barX - 1, barY + barH2 - filled - 2, 8, 3, C.white);

    // ── Hit flash overlay ─────────────────────────────────
    if (this.hitFlash > 0) {
      ctx.fillStyle = `rgba(255,0,0,${(this.hitFlash / 0.3) * 0.28})`;
      ctx.fillRect(0, 0, BASE_W, BASE_H);
    }
    // Damage warning above Chloe
    if (this.invincible > 0 && this.invincible < 1.8) {
      if (Math.floor(this.invincible * 5) % 2)
        drawText('!', this.chloeX, LVL2_CHLOE_Y - 24, C.red, 2, 'center');
    }

    // ── Level-complete overlay ────────────────────────────
    if (this.finished) {
      ctx.fillStyle = 'rgba(0,0,0,0.72)';
      ctx.fillRect(0, 0, BASE_W, BASE_H);
      drawText('LEVEL 2 COMPLETE!', BASE_W/2, 55,  C.yellow, 2, 'center');
      drawText('CHLOE MADE IT TO THE LODGE!', BASE_W/2, 80, C.green, 1, 'center');
      rect(BASE_W/2 - 92, 92, 184, 1, C.gray);
      drawText('DOLLARS:  ' + formatScore(this.dollarScore) + ' PTS',
               BASE_W/2,  98, C.white, 1, 'center');
      const bonusLabel = this.lifeBonus > 0 ? '+' + this.lifeBonus + ' PTS' : 'NONE';
      const bonusColor = this.lifeBonus > 0 ? C.green : C.gray;
      drawText('LIFE BONUS:  ' + bonusLabel, BASE_W/2, 112, bonusColor, 1, 'center');
      rect(BASE_W/2 - 92, 124, 184, 1, C.gray);
      drawText('TOTAL:  ' + formatScore(this.finalScore) + ' PTS',
               BASE_W/2, 130, C.yellow, 1, 'center');
      if (this.showEndPrompt) {
        rect(BASE_W/2 - 102, 144, 204, 1, C.gray);
        if (Math.floor(performance.now() / 500) % 2 === 0)
          drawText('PRESS ENTER - HIGH SCORES', BASE_W/2, 152, C.yellow, 1, 'center');
        drawText('PRESS ESC - LEVEL SELECT',  BASE_W/2, 166, C.gray,   1, 'center');
      }
    }
  },
};

// ── SCORE FORMATTER ───────────────────────────────────────────────────────────
function formatScore(pts) {
  return pts.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

// ═══════════════════════════════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════════════════════════════
let lastTime = performance.now();

function gameLoop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  // ── QUICK SAVE STATE: Numpad1 → Level 1 near gas station ──
  if (consumeKey('Numpad1')) {
    setScene(Level1Scene);               // calls init() + placeDollars()
    scene.px          = scene.gasStationX - 350;
    scene.py          = scene.groundY - 20;
    scene.pvx         = 0;
    scene.pvy         = 0;
    scene.onGround    = true;
    scene.scrollX     = scene.px - 80;
    scene.gameStarted = true;
    scene.gameElapsed = 10;
    scene.health      = 3;
    scene.score       = 900;
    scene.dollarScore = 900;
  }
  // ── QUICK SAVE STATE: Numpad2 → Level 2 near the lodge ──
  if (consumeKey('Numpad2')) {
    setScene(Level2Scene);               // calls init() + placeDollars()
    scene.scrollY     = LVL2_GOAL_Y - 800;
    scene.scrollSpeed = 150;
    scene.gameStarted = true;
    scene.gameElapsed = 20;
    scene.health      = 3;
    scene.score       = 1200;
    scene.dollarScore = 1200;
    scene.chloeX      = BASE_W / 2;
    // Mark all but last 3 dollars collected so they show near-lodge
    for (let i = 0; i < scene.dollars.length - 3; i++) scene.dollars[i].collected = true;
  }

  // Clear justPressed each frame after update
  scene.update(dt);
  Object.keys(justPressed).forEach(k => delete justPressed[k]);

  ctx.clearRect(0, 0, BASE_W, BASE_H);
  scene.draw();

  requestAnimationFrame(gameLoop);
}

setScene(TitleScene);
requestAnimationFrame(gameLoop);
</script>
